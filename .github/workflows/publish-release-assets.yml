name: Publish Release Assets

on:
  workflow_call:
    inputs:
      asset-patterns:
        description: Newline-separated filename globs to upload as release assets.
        required: false
        default: ""
        type: string

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          VERSION="$(sed -n '/^\[workspace\.package\]/,/^\[/ { s/^[[:space:]]*version[[:space:]]*=[[:space:]]*"\([^"]*\)".*/\1/p; }' Cargo.toml | head -n 1)"
          if [ -z "$VERSION" ]; then
            echo "Workspace version was not found."
            exit 1
          fi
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          ASSET_PATTERNS: ${{ inputs.asset-patterns }}
          VERSION: ${{ steps.version.outputs.value }}
        run: |
          if [ -z "$RELEASE_TAG" ]; then
            echo "Release tag is not available."
            exit 1
          fi

          mapfile -t all_files < <(find release-assets -type f -print)
          assets=()

          while IFS= read -r pattern; do
            [ -z "$pattern" ] && continue
            for file in "${all_files[@]}"; do
              filename="$(basename "$file")"
              # shellcheck disable=SC2254
              case "$filename" in
                $pattern) assets+=("$file") ;;
              esac
            done
          done <<< "$ASSET_PATTERNS"

          if [ "${#assets[@]}" -eq 0 ]; then
            echo "No release assets found."
            exit 1
          fi

          for asset in "${assets[@]}"; do
            filename="$(basename "$asset")"
            case "$filename" in
              "Swanium-${VERSION}-macos-universal.zip" | \
              "Swanium-${VERSION}-windows-x64.zip" | \
              "Swanium-${VERSION}-windows-arm64.zip" | \
              "Swanium-${VERSION}-linux-x64.deb" | \
              "Swanium-${VERSION}-linux-x64.rpm" | \
              "Swanium-${VERSION}-linux-arm64.deb" | \
              "Swanium-${VERSION}-linux-arm64.rpm") ;;
              *)
                echo "Unexpected release asset name: $filename"
                exit 1
                ;;
            esac
          done

          gh release upload "$RELEASE_TAG" "${assets[@]}" --clobber
