name: CI Linux

on:
  push:
    branches: [main, master]
    paths:
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'rust-toolchain.toml'
      - 'crates/**'
      - 'packaging/linux/**'
      - 'scripts/build-linux-app.sh'
      - 'tests/**'
      - '.github/workflows/ci-linux.yml'
      - '.github/workflows/publish-release-assets.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'rust-toolchain.toml'
      - 'crates/**'
      - 'packaging/linux/**'
      - 'scripts/build-linux-app.sh'
      - 'tests/**'
      - '.github/workflows/ci-linux.yml'
      - '.github/workflows/publish-release-assets.yml'
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name != 'release' }}

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      # Linux system libraries required by the desktop crates:
      #   slint (winit + femtovg): fontconfig, xkbcommon, Wayland/X11, OpenGL
      #   rfd (xdg-portal): fontconfig
      #   gilrs (gamepad input): udev
      #   cpal (audio output): ALSA
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libfontconfig-dev \
            libxkbcommon-dev \
            libwayland-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libgl1-mesa-dev \
            libudev-dev \
            libasound2-dev
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace

  bundle:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            release-arch: x64
            runs-on: ubuntu-22.04
            deb-artifact: swanium-linux-amd64-deb
            rpm-artifact: swanium-linux-amd64-rpm
          - arch: arm64
            release-arch: arm64
            runs-on: ubuntu-22.04-arm
            deb-artifact: swanium-linux-arm64-deb
            rpm-artifact: swanium-linux-arm64-rpm
    runs-on: ${{ matrix.runs-on }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      # Linux system libraries required by the desktop crates:
      #   slint (winit + femtovg): fontconfig, xkbcommon, Wayland/X11, OpenGL
      #   rfd (xdg-portal): fontconfig
      #   gilrs (gamepad input): udev
      #   cpal (audio output): ALSA
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libfontconfig-dev \
            libxkbcommon-dev \
            libwayland-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libgl1-mesa-dev \
            libudev-dev \
            libasound2-dev
      - name: Install packaging tools
        run: |
          cargo install cargo-deb --locked
          cargo install cargo-generate-rpm --locked
      - name: Build and package
        run: |
          chmod +x scripts/build-linux-app.sh
          ./scripts/build-linux-app.sh --architecture "${{ matrix.release-arch }}" --dist-dir dist
      - name: Upload DEB artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.deb-artifact }}
          path: dist/deb/
          if-no-files-found: error
      - name: Upload RPM artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.rpm-artifact }}
          path: dist/rpm/
          if-no-files-found: error

  publish-release:
    if: github.event_name == 'release'
    needs: bundle
    permissions:
      contents: write
    uses: ./.github/workflows/publish-release-assets.yml
    with:
      asset-patterns: |
        *.deb
        *.rpm
